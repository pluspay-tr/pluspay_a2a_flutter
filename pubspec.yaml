name: pluspay_a2a
description: "PlusPay A2A (app-to-app) payment plugin for Android POS devices — start payments, EOD, refunds and transaction queries."
version: 0.5.0
homepage: https://github.com/plus-pay-tr/pluspay_a2a
repository: https://github.com/plus-pay-tr/pluspay_a2a

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  android_intent_plus: ^6.0.0
  intl: ^0.20.2
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  freezed_annotation: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.0
  freezed: ^3.0.6
  json_serializable: ^6.9.5


flutter:
  plugin:
    platforms:
      android:
        package: tr.com.pluspay.pluspay_a2a
        pluginClass: PluspayA2aPlugin

